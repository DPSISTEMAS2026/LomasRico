# ══════════════════════════════════════════════════════════
# Lo Más Rico V3 — Render Blueprint
# 3 servicios en plan Free para pruebas
# ══════════════════════════════════════════════════════════

services:
  # --------------------------------------------------------
  # 1. API BACKEND (NestJS + Prisma)
  # --------------------------------------------------------
  - type: web
    name: pro-lomasrico-api
    env: node
    plan: free
    region: oregon
    rootDir: .
    autoDeploy: true
    buildCommand: "npm install && npx prisma generate --schema=packages/database/prisma/schema.prisma && npm run build --workspace=api"
    startCommand: "npm run start:prod --workspace=api"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.9.0"
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PEDIDOSYA_TOKEN
        sync: false
      - key: FRONTEND_URL
        value: "https://pro-lomasrico-web.onrender.com"
      - key: API_URL
        value: "https://pro-lomasrico-api.onrender.com"
      - key: ALLOWED_ORIGINS
        value: "https://pro-lomasrico-web.onrender.com,https://pro-lomasrico-panels.onrender.com"
      - key: SKIP_SEED
        value: "true"

  # --------------------------------------------------------
  # 2. WEB STOREFRONT (Next.js — Cliente Final)
  # --------------------------------------------------------
  - type: web
    name: pro-lomasrico-web
    env: node
    plan: free
    region: oregon
    rootDir: .
    autoDeploy: true
    buildCommand: "npm install && npm run build --workspace=@lomasrico/shared-types && npm run build --workspace=web"
    startCommand: "npm run start --workspace=web -- -p 10000 -H 0.0.0.0"
    envVars:
      - key: NODE_VERSION
        value: "20.9.0"
      - key: PORT
        value: "10000"
      - key: NEXT_PUBLIC_API_URL
        value: "https://pro-lomasrico-api.onrender.com"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY
        sync: false
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false

  # --------------------------------------------------------
  # 3. ADMIN PANEL (Next.js — POS, Kitchen, Owner)
  # --------------------------------------------------------
  - type: web
    name: pro-lomasrico-panels
    env: node
    plan: free
    region: oregon
    rootDir: .
    autoDeploy: true
    buildCommand: "npm install && npm run build --workspace=@lomasrico/shared-types && npm run build --workspace=panels"
    startCommand: "npm run start --workspace=panels -- -p 10000 -H 0.0.0.0"
    envVars:
      - key: NODE_VERSION
        value: "20.9.0"
      - key: PORT
        value: "10000"
      - key: NEXT_PUBLIC_API_URL
        value: "https://pro-lomasrico-api.onrender.com"
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
